# Change the starting number of panes and windows to 1
set-option -g base-index 1
set-option -g pane-base-index 1

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Prefer explicit custom bindings for creating windows and sessions.
unbind-key c
unbind-key C-c

# Automatic renumbering of pane and window numbers
set-option -g renumber-windows on

# Keep window names stable; rename them explicitly with prefix + ,.
set-option -g allow-rename off
set-option -g automatic-rename off

# Shared command aliases for custom bindings and the shortcut launcher.
set-option -s command-alias[100] 'my-split-right=run-shell -b "~/.local/libexec/tmux/open split-h #{pane_id}"'
set-option -s command-alias[101] 'my-split-down=run-shell -b "~/.local/libexec/tmux/open split-v #{pane_id}"'
set-option -s command-alias[102] 'my-new-window=command-prompt -p "window name:" "new-window -n \"%%\""'
set-option -s command-alias[103] 'my-new-session=command-prompt -p "session name:" "new-session -s \"%%\""'
set-option -s command-alias[104] 'my-rename-window=command-prompt -I "#{window_name}" -p "window name:" "rename-window \"%%\""'
set-option -s command-alias[105] 'my-rename-session=command-prompt -I "#{session_name}" -p "session name:" "rename-session \"%%\""'
set-option -s command-alias[106] 'my-edit-pane-label=command-prompt -I "#{@pane_label}" -p "pane label:" "set-option -p @pane_label \"%%\""'
set-option -s command-alias[107] 'my-clear-pane-label=set-option -pu @pane_label'
set-option -s command-alias[108] 'my-shell-popup=run-shell -b "~/.local/libexec/tmux/open popup #{pane_id}"'
set-option -s command-alias[109] 'my-lazygit-popup=run-shell -b "~/.local/libexec/tmux/open popup-lazygit #{pane_id}"'
set-option -s command-alias[110] 'my-lazygit-bottom-pane=run-shell -b "~/.local/libexec/tmux/run-in-pane --select below #{pane_id} lazygit"'
set-option -s command-alias[111] 'my-open-project=display-popup -xC -yC -w 85% -h 85% -T " project " -E "~/.local/libexec/tmux/project"'
set-option -s command-alias[112] 'my-switch-session=choose-tree -Zs -O activity -F "#{?session_attached,#[fg=#a6e3a1]● ,  }#[default]#{session_name} #[fg=#6c7086](#{session_windows} windows)#[default]"'

# Pane creation from the active pane's Claude-aware current directory.
bind | my-split-right
bind - my-split-down

# Adjusting pane sizes
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# Create named windows and sessions.
bind t my-new-window
bind T my-new-session
bind r my-rename-window
bind R my-rename-session
bind e my-edit-pane-label
bind E my-clear-pane-label

# Open shells and lazygit from the active pane's Claude-aware current directory.
bind u my-shell-popup
bind g my-lazygit-popup
bind G my-lazygit-bottom-pane

# Open project sessions from a repository picker.
bind P my-open-project

# Shortcut launcher and quick reference.
bind m display-menu -xC -yC -T ' tmux shortcuts ' \
    'Open project                      P' P 'my-open-project' \
    'Switch session                    s' s 'my-switch-session' \
    '' '' '' \
    'Shell popup                       u' u 'my-shell-popup' \
    'Lazygit popup                     g' g 'my-lazygit-popup' \
    'Lazygit in pane below             G' G 'my-lazygit-bottom-pane' \
    '' '' '' \
    'New session                       T' T 'my-new-session' \
    'New window                        t' t 'my-new-window' \
    '' '' '' \
    'Rename session                    R' R 'my-rename-session' \
    'Rename window                     r' r 'my-rename-window' \
    'Edit pane label                   e' e 'my-edit-pane-label' \
    'Clear pane label                  E' E 'my-clear-pane-label'

# Moving windows
bind -r n next-window
bind -r p previous-window

# Use vi key bindings in copy mode
setw -g mode-keys vi

# Start selection with 'v'
bind -T copy-mode-vi v send -X begin-selection

# Copy selection to Mac clipboard with 'y'
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# Enter copy mode with mouse scrolling
set -g mouse on

# Catppuccin Mocha styling
setw -g mode-style 'bg=#89b4fa,fg=#1e1e2e,bold'

set -g message-style 'bg=#313244,fg=#cdd6f4'
set -g message-command-style 'bg=#313244,fg=#cdd6f4'
set -g popup-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g popup-border-style 'bg=#1e1e2e,fg=#89b4fa'

set -g status-position bottom
set -g status-bg '#1e1e2e'
set -g status-fg '#cdd6f4'
set -g status-style 'bg=#1e1e2e,fg=#bac2de'
set -g status-left '#[fg=#cdd6f4,bg=#313244,bold] #{=/18/...:session_name} #[bg=#1e1e2e,fg=#1e1e2e]  '
set -g status-right '#{?window_zoomed_flag,#[fg=#89b4fa]#[bold] Z,}'
set -g status-right-length 50
set -g status-left-length 24

setw -g window-status-separator '  '
setw -g window-status-current-style bg='#1e1e2e',fg='#cdd6f4',bold
setw -g window-status-current-format '#[fg=#89b4fa,bold]#I #[fg=#cdd6f4,bold]#{=/28/...:window_name}'

setw -g window-status-style fg='#6c7086',bg='#1e1e2e'
setw -g window-status-format '#[fg=#6c7086]#I #[fg=#7f849c]#{=/20/...:window_name}'

set -g pane-border-style bg='#1e1e2e',fg='#313244'
set -g pane-active-border-style bg='#1e1e2e',fg='#585b70'
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[bold]#[fg=#89b4fa] #{pane_index} #[fg=#cdd6f4]#{=/24/...:#{?@pane_label,#{@pane_label},#{b:pane_current_path}}} ,#[fg=#6c7086] #{pane_index} #{=/24/...:#{?@pane_label,#{@pane_label},#{b:pane_current_path}}} }'

# Eliminate ESC key delay
set -sg escape-time 0

# Use 256-color terminal
set -g default-terminal "screen-256color"

# Make the session chooser wider and more informative
bind s my-switch-session

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
run-shell '~/.tmux/plugins/tpm/tpm'
